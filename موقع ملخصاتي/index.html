<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ملخصاتي - Kotobati | ملخصات الكتب بالعربية والإنجليزية"/>
  <title>ملخصاتي | Kotobati</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>

  <link rel="icon" href="شعار خطوة واحدة جديد.png">
</head>
<body>

  <!-- ══ PROGRESS BAR ══ -->
  <div class="read-progress" id="readProgress"></div>

  <!-- ══ TOAST ══ -->
  <div class="toast" id="toast"></div>

  <!-- ══ SHARE MODAL ══ -->
  <div class="modal-overlay" id="shareOverlay" onclick="closeShare()">
    <div class="share-modal" onclick="event.stopPropagation()">
      <button class="modal-close" onclick="closeShare()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="share-header">
        <div class="share-icon-wrap">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </div>
        <div>
          <h3 class="share-title" id="shareTitle">مشاركة الكتاب</h3>
          <p class="share-book-name" id="shareBookName"></p>
        </div>
      </div>

      <div class="share-link-row">
        <input class="share-link-input" id="shareLinkInput" readonly/>
        <button class="share-copy-btn" id="shareCopyBtn" onclick="copyShareLink()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span id="shareCopyLabel">نسخ</span>
        </button>
      </div>

      <div class="share-socials">
        <button class="social-btn whatsapp" onclick="shareVia('whatsapp')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
          WhatsApp
        </button>
        <button class="social-btn twitter" onclick="shareVia('twitter')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          X / Twitter
        </button>
        <button class="social-btn telegram" onclick="shareVia('telegram')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          Telegram
        </button>
      </div>
    </div>
  </div>

  <!-- ══ HEADER ══ -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <div class="logo" onclick="navigateTo('home')" role="button" tabindex="0">
        <span class="logo-ar" id="logoAr">ملخصاتي</span>
        <span class="logo-dot">·</span>
        <span class="logo-en" id="logoEn">Kotobati</span>
      </div>
      <div class="header-controls">
        <button class="nav-home-btn" onclick="navigateTo('home')" data-i18n="navHome">الرئيسية</button>
        <button class="icon-btn" id="darkToggle" onclick="toggleDark()" aria-label="Dark mode">
          <svg id="iconSun" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="iconMoon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()" aria-label="Switch language">
          <span class="lt-label" id="ltAr">العربية</span>
          <span class="lt-track"><span class="lt-thumb"></span></span>
          <span class="lt-label" id="ltEn">EN</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ══ HERO ══ -->
  <section class="hero" id="heroSection">
    <div class="hero-bg-word" id="heroBgWord" aria-hidden="true">KOTOBATI</div>
    <div class="hero-orb orb-1" aria-hidden="true"></div>
    <div class="hero-orb orb-2" aria-hidden="true"></div>
    <div class="hero-orb orb-3" aria-hidden="true"></div>
    <div class="hero-content">
      <span class="hero-eyebrow" id="heroEyebrow">اكتشف · اقرأ · استمع</span>
      <h1 class="hero-title">
        <span id="heroLine1">ملخصات كتب</span><br/>
        <em id="heroLine2">تستحق وقتك</em>
      </h1>
      <p class="hero-desc" id="heroDesc">ملخصات نصية وصوتية باللغتين العربية والإنجليزية.</p>
      <div class="hero-actions">
        <button class="btn-primary" onclick="scrollToLibrary()" data-i18n="heroCta">تصفح المكتبة</button>
      </div>
      <div class="hero-stats" id="heroStats"></div>
    </div>
  </section>

  <!-- ══ MAIN ══ -->
  <main class="main-content" id="mainContent">

    <!-- HOME VIEW -->
    <div id="homeView" class="view active">
      <div class="library-header" id="libraryAnchor">
        <div class="lib-title-row">
          <div>
            <h2 class="library-title" data-i18n="libraryTitle">المكتبة</h2>
            <p class="library-sub" data-i18n="librarySub">كل كتاب، ملخص وافٍ في دقائق</p>
          </div>
          <!-- Search -->
          <div class="search-wrap">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input class="search-input" id="searchInput" data-i18n-placeholder="searchPlaceholder"
              placeholder="ابحث عن كتاب..." oninput="filterBooks(this.value)" autocomplete="off"/>
          </div>
        </div>
      </div>
      <div class="books-grid" id="booksGrid"></div>
      <div class="no-results" id="noResults" style="display:none">
        <span data-i18n="noResults">لا توجد نتائج</span>
      </div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailView" class="view">
      <div class="detail-topbar">
        <button class="back-btn" onclick="navigateTo('home')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span data-i18n="backBtn">العودة إلى المكتبة</span>
        </button>
        <button class="share-btn" id="detailShareBtn" onclick="openShare()" data-i18n="shareBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          مشاركة
        </button>
      </div>
      <div id="bookDetailWrap"></div>
    </div>

  </main>

  <!-- ══ FOOTER ══ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-brand" id="footerBrand">ملخصاتي · Kotobati</span>
      <span class="footer-copy" data-i18n="footerCopy">© 2025 — جميع الحقوق محفوظة</span>
    </div>
  </footer>

  <!-- ══ SCROLL TO TOP ══ -->
  <button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
